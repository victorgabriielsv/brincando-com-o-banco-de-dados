<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador de Tarefas</title>
    <style>
        body { background-color: #062f19; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { width: 400px; margin-top: 20px; }
        form, .card { background: #f3f4f6; color: black; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        input, textarea, button { width: 100%; margin-top: 8px; padding: 8px; box-sizing: border-box; }
        button { background-color: #059669; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-delete { background-color: #dc2626; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>GERENCIADOR DE TAREFAS</h2>

    <div class="container">
        <form id="formulario">
            <input type="text" id="titulo" placeholder="Título" required>
            <textarea id="descricao" placeholder="Descrição" required></textarea>
            <button type="submit">ADICIONAR</button>
        </form>

        <div id="lista"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
